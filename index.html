<!DOCTYPE html>
<html>
<head>
    <title>Untuk Zahra ❤️</title>
    <style>
        body { background: #1a1a1a; color: #ff85a2; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; text-align: center; }
        h1 { font-size: 2.5rem; animation: fadeIn 2s; }
        .heart { font-size: 80px; animation: beat 0.8s infinite; cursor: pointer; filter: drop-shadow(0 0 10px #ff85a2); }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        p { color: white; font-style: italic; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Hai Cantik, Semangat Ya! ❤️</h1>
    <div class="heart" onclick="alert('I Love You So Much! ❤️')">💖</div>
    <p>"Klik jantungnya kalau kamu kangen aku"</p>
</body>
</html>
