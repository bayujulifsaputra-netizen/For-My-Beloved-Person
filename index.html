<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special for Zahra</title>
    <style>
        body {
            background-color: #0b0b0b;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        /* Efek Bunga Sakura */
        .sakura {
            position: absolute;
            background-color: #ffb7c5;
            border-radius: 100% 0 100% 0;
            opacity: 0.7;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }

        h1 {
            font-size: 2.5rem;
            color: #ff85a2;
            text-shadow: 0 0 15px rgba(255, 133, 162, 0.5);
            z-index: 10;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .heart {
            font-size: 80px;
            animation: pulse 1.5s infinite;
            display: inline-block;
            cursor: pointer;
            filter: drop-shadow(0 0 10px #ff4d94);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        p {
            font-size: 1.1rem;
            letter-spacing: 1px;
            color: #ddd;
        }

        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>
<body>

    <div id="sakura-container"></div>

    <div class="container">
        <div class="heart" onclick="showLove()">💖</div>
        <h1>For My Universe</h1>
        <p>"Di antara milyaran orang, aku paling bersyukur ada kamu."</p>
        <div class="footer">Made with ❤️ for Zahra</div>
    </div>

    <script>
        // Membuat efek bunga sakura secara otomatis
        function createSakura() {
            const container = document.getElementById('sakura-container');
            const leaf = document.createElement('div');
            leaf.classList.add('sakura');
            leaf.style.left = Math.random() * 100 + 'vw';
            leaf.style.width = Math.random() * 10 + 5 + 'px';
            leaf.style.height = leaf.style.width;
            leaf.style.animationDuration = Math.random() * 3 + 2 + 's';
            leaf.style.opacity = Math.random();
            
            container.appendChild(leaf);
            
            setTimeout(() => {
                leaf.remove();
            }, 5000);
        }

        setInterval(createSakura, 200);

        function showLove() {
            alert("Kamu itu orang paling pinter dan baik yang pernah aku kenal. Stay with me ya? ❤️");
        }
    </script>
</body>
</html>
